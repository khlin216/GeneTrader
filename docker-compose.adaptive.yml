version: '3.8'

# GeneTrader Adaptive Optimization Stack
#
# This docker-compose file runs:
# 1. GeneTrader Daemon - Continuous monitoring and optimization
# 2. Agent API - REST API for external integration
#
# Usage:
#   docker-compose -f docker-compose.adaptive.yml up -d
#
# View logs:
#   docker-compose -f docker-compose.adaptive.yml logs -f
#

services:
  genetrader-daemon:
    build:
      context: .
      dockerfile: Dockerfile.adaptive
    container_name: genetrader-daemon
    restart: unless-stopped
    environment:
      - GENETRADER_CONFIG=/app/ga.json
      - PYTHONPATH=/app
      - TZ=UTC
    volumes:
      - ./ga.json:/app/ga.json:ro
      - ./data:/app/data
      - ./user_data:/app/user_data
      - ./results:/app/results
      - ./checkpoints:/app/checkpoints
    command: >
      python scripts/genetrader_daemon.py
      --config ga.json
      --strategy GeneTrader
      --check-interval 300
      --optimize-interval 259200
    networks:
      - genetrader-net
    # Connect to Freqtrade if running in docker
    # external_links:
    #   - freqtrade:freqtrade
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 10s
      retries: 3

  agent-api:
    build:
      context: .
      dockerfile: Dockerfile.adaptive
    container_name: genetrader-api
    restart: unless-stopped
    ports:
      - "8090:8090"
    environment:
      - GENETRADER_CONFIG=/app/ga.json
      - PYTHONPATH=/app
      - AGENT_API_KEY=${AGENT_API_KEY:-default-key}
    volumes:
      - ./ga.json:/app/ga.json:ro
      - ./data:/app/data
    command: >
      python run_adaptive.py
      --strategy GeneTrader
      --api-port 8090
      --check-only
    networks:
      - genetrader-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  genetrader-net:
    driver: bridge

volumes:
  data:
  results:
